name: Refresh repos.json

# Keeps the "Also on GitHub" grid static (no client-side API rate limits) by
# regenerating repos.json from the authenticated GitHub API on a schedule.
on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/build-repos.sh"
      - "scripts/repos-filter.jq"
      - ".github/workflows/refresh-repos.yml"

permissions:
  contents: write

concurrency:
  group: refresh-repos
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate repos.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/build-repos.sh

      - name: Commit if changed
        run: |
          if git diff --quiet -- repos.json; then
            echo "No changes to repos.json."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git commit -m "chore: refresh repos.json"
          git push
