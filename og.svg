<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4c8dff"/>
      <stop offset="0.48" stop-color="#2ad4e6"/>
      <stop offset="1" stop-color="#34d39e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0" r="0.7">
      <stop offset="0" stop-color="#2ad4e6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2ad4e6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.05" r="0.6">
      <stop offset="0" stop-color="#4c8dff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4c8dff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#96b4dc" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <clipPath id="av"><rect x="74" y="78" width="120" height="120" rx="28"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#070a10"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#grad)"/>

  <image href="data:image/jpeg;base64," x="74" y="78" width="120" height="120" clip-path="url(#av)"/>
  <rect x="74" y="78" width="120" height="120" rx="28" fill="none" stroke="#96b4dc" stroke-opacity="0.25"/>

  <g font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif">
    <text x="218" y="128" font-size="26" fill="#9aa6bb" font-weight="600">Andreas Müller</text>
    <text x="218" y="170" font-size="22" fill="#2ad4e6" font-family="SF Mono, Menlo, monospace">Rust · Swift · TypeScript · Java</text>

    <text x="74" y="320" font-size="74" font-weight="700" fill="#e9eef7" letter-spacing="-2">I build native apps and the</text>
    <text x="74" y="406" font-size="74" font-weight="700" letter-spacing="-2" fill="url(#grad)">tools that ship them.</text>

    <text x="74" y="476" font-size="25" fill="#9aa6bb">Native macOS &amp; iPadOS apps · memory-safe Rust cores · PostgreSQL &amp; SSH &amp; cargo tooling</text>
