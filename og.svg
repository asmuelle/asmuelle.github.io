    <rect x="74" y="528" width="290" height="46" rx="23" fill="#2ad4e6" fill-opacity="0.07" stroke="#34d39e" stroke-opacity="0.5"/>
    <circle cx="100" cy="551" r="5" fill="#34d39e"/>
    <text x="116" y="558" font-size="19" fill="#34d39e">Available for consulting</text>

    <text x="1126" y="558" font-size="20" fill="#6b768c" text-anchor="end">asmuelle.github.io</text>
